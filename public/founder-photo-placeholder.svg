<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title description">
  <title id="title">Private preview portrait placeholder for Pierre Denis</title>
  <desc id="description">A restrained illustrated portrait placeholder. Replace with an approved real photograph of Pierre Denis before public release.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="portrait" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b9d6f3"/>
      <stop offset="100%" stop-color="#5c91c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#102a43" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#background)"/>
  <rect x="72" y="72" width="1056" height="1056" rx="48" fill="#ffffff" stroke="#d8e1eb" stroke-width="4" filter="url(#shadow)"/>

  <g transform="translate(600 476)">
    <circle r="260" fill="#e9f2fb" stroke="#9bbde0" stroke-width="8"/>
    <circle cy="-68" r="106" fill="url(#portrait)"/>
    <path d="M-192 208c18-150 128-232 192-232s174 82 192 232" fill="url(#portrait)"/>
    <path d="M-132 198c28-90 92-140 132-140s104 50 132 140" fill="#f7fafc" opacity="0.92"/>
  </g>

  <rect x="180" y="806" width="840" height="1" fill="#d8e1eb"/>
  <text x="600" y="878" fill="#102a43" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" text-anchor="middle">Pierre Denis</text>
  <text x="600" y="934" fill="#486581" font-family="Arial, Helvetica, sans-serif" font-size="28" text-anchor="middle">PRIVATE PREVIEW PORTRAIT PLACEHOLDER</text>

  <rect x="252" y="978" width="696" height="72" rx="36" fill="#e8f3ff" stroke="#8ab8e8" stroke-width="2"/>
  <text x="600" y="1024" fill="#0b4f8a" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle">REPLACE WITH AN APPROVED REAL PHOTOGRAPH BEFORE PUBLIC RELEASE</text>
</svg>
